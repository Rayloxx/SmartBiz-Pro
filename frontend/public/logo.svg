<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="48" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- Bar chart columns -->
  <rect x="8" y="30" width="6" height="10" rx="1.5" fill="white" opacity="0.35"/>
  <rect x="17" y="22" width="6" height="18" rx="1.5" fill="white" opacity="0.5"/>
  <rect x="26" y="16" width="6" height="24" rx="1.5" fill="white" opacity="0.65"/>
  <!-- Trending line over bars -->
  <polyline points="11,30 20,21 29,15 38,9" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Dot at peak -->
  <circle cx="38" cy="9" r="2.5" fill="#34D399"/>
  <!-- Small circuit node dots -->
  <circle cx="11" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="20" cy="21" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="29" cy="15" r="1.5" fill="white" opacity="0.7"/>
</svg>
